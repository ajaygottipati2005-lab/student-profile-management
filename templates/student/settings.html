{% extends "student/base.html" %}
{% block title %}Settings{% endblock %}
{% block page_heading %}Settings{% endblock %}
{% block content %}
<div class="app-card">
    <h1 class="h4 mb-4">Settings</h1>
    <h2 class="h6 text-muted">Change password</h2>
    <form method="POST" action="{{ url_for('change_password') }}" class="row g-3 mb-4">
        <div class="col-12">
            <input type="password" class="form-control" name="old_password" placeholder="Old password" required>
        </div>
        <div class="col-12">
            <input type="password" class="form-control" name="new_password" placeholder="New password" required>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary w-100">Change Password</button>
        </div>
    </form>
    <h2 class="h6 text-muted">Theme</h2>
    <button type="button" class="btn btn-outline-secondary w-100 mb-4" id="theme-toggle">Toggle light / dark</button>
    <h2 class="h6 text-muted">Account</h2>
    <a href="{{ url_for('logout') }}" class="btn btn-danger w-100">Logout</a>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('theme-toggle')?.addEventListener('click',function(){document.body.classList.toggle('dark-mode');});
</script>
{% endblock %}
