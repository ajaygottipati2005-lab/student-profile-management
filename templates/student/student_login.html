                <!DOCTYPE html>
                <html>
                <head>
                    <title>Student Login</title>

                    <style>
                        body {
                            font-family: Arial, sans-serif;
                            background: #f2f2f2;
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            height: 100vh;
                        }

                        .box {
                            background: white;
                            padding: 30px;
                            border-radius: 10px;
                            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
                            width: 300px;
                            text-align: center;
                        }

                        h2 {
                            margin-bottom: 20px;
                        }

                        input {
                            width: 90%;
                            padding: 10px;
                            margin: 8px 0;
                            border: 1px solid #ccc;
                            border-radius: 5px;
                        }

                        button {
                            width: 95%;
                            padding: 10px;
                            margin-top: 10px;
                            border: none;
                            border-radius: 5px;
                            cursor: pointer;
                            font-weight: bold;
                        }

                        .student-btn {
                            background-color: #4CAF50;
                            color: white;
                        }

                        .admin-btn {
                            background-color: #007BFF;
                            color: white;
                        }

                        .admin-btn:hover {
                            background-color: #0056b3;
                                    
                        .student-btn:hover {
                            background-color: #3e8e41;
                        }

                        .divider {
                            margin: 15px 0;
                            font-size: 12px;
                            color: gray;
                        }
                    </style>

                </head>
                <body>

                <div class="box">

                    <h2>Student Login</h2>

                    <form action="/login" method="POST">
                        <input type="text" name="roll" placeholder="Roll Number" required>
                        <input type="password" name="password" placeholder="Password" required>

                        <button type="submit" class="student-btn">Login</button>
                    </form>

                    <div class="divider">OR</div>

                    <a href="/admin">
                        <button class="admin-btn" type="button">Admin Login</button>
                    </a>
                    <a href="/staff">
                        <button class="admin-btn" type="button">Staff Login</button>
                    </a>

                </div>

                </body>
                </html>
