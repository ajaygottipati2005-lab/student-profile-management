{% extends "layouts/auth.html" %}

{% block title %}Student Login{% endblock %}
{% block auth_heading %}Student Login{% endblock %}
{% block auth_subheading %}Enter your roll number and password{% endblock %}

{% block auth_content %}
<form action="{{ url_for('login') }}" method="POST" class="vstack gap-3">
    <div>
        <label for="roll" class="form-label">Roll Number</label>
        <input type="text" class="form-control" id="roll" name="roll" placeholder="Roll Number" required autocomplete="username">
    </div>
    <div>
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i> Login as Student
    </button>
</form>

<div class="auth-divider">OR</div>

<div class="vstack gap-2">
    <a href="{{ url_for('admin_login') }}" class="btn btn-outline-primary w-100">
        <i class="bi bi-shield-lock me-1"></i> Admin Login
    </a>
    <a href="{{ url_for('staff_login') }}" class="btn btn-outline-secondary w-100">
        <i class="bi bi-person-workspace me-1"></i> Staff Login
    </a>
</div>
{% endblock %}
