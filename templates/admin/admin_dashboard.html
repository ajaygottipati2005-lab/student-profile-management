<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .dashboard-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .dashboard-card a {
            display: block;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }

        .dashboard-card .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .logout-link {
            text-align: center;
        }

        .logout-link a {
            display: inline-block;
            padding: 12px 30px;
            background: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .logout-link a:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👨‍💼 Admin Dashboard</h1>

        <div class="dashboard-grid">
            <div class="dashboard-card">
                <div class="icon">➕</div>
                <a href="/add_student">Add Student</a>
            </div>

            <div class="dashboard-card">
                <div class="icon">✏️</div>
                <a href="/modify_student">Modify Student</a>
            </div>

            <div class="dashboard-card">
                <div class="icon">👥</div>
                <a href="/add_staff">Add Staff</a>
            </div>

            <div class="dashboard-card">
                <div class="icon">🛠️</div>
                <a href="/modify_staff">Manage Staff</a>
            </div>

            <div class="dashboard-card">
                <div class="icon">🏢</div>
                <a href="/add_institution">Add Institution</a>
            </div>

            <div class="dashboard-card">
                <div class="icon"></div>
                <a href="/allocate_subjects">Allocate Subjects</a>
            </div>
        </div>

        <div class="logout-link">
            <a href="/admin_logout">Logout</a>
        </div>
    </div>
</body>
</html>
