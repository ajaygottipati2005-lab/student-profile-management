{% extends "layouts/admin.html" %}

{% block title %}Dashboard{% endblock %}
{% block page_heading %}Admin Dashboard{% endblock %}

{% block content %}
<div class="dashboard-grid">
    <a href="{{ url_for('add_student') }}" class="dashboard-tile">
        <i class="bi bi-person-plus-fill"></i>
        <span>Add Student</span>
    </a>
    <a href="{{ url_for('modify_student') }}" class="dashboard-tile">
        <i class="bi bi-pencil-square"></i>
        <span>Modify Student</span>
    </a>
    <a href="{{ url_for('add_staff') }}" class="dashboard-tile">
        <i class="bi bi-person-badge-fill"></i>
        <span>Add Staff</span>
    </a>
    <a href="{{ url_for('modify_staff') }}" class="dashboard-tile">
        <i class="bi bi-people-fill"></i>
        <span>Manage Staff</span>
    </a>
    <a href="{{ url_for('add_institution') }}" class="dashboard-tile">
        <i class="bi bi-building"></i>
        <span>Add Institution</span>
    </a>
    <a href="{{ url_for('allocate_subjects') }}" class="dashboard-tile">
        <i class="bi bi-journal-bookmark-fill"></i>
        <span>Allocate Subjects</span>
    </a>
    <a href="{{ url_for('change_email') }}" class="dashboard-tile">
        <i class="bi bi-envelope-at-fill"></i>
        <span>Change Email</span>
    </a>
</div>
{% endblock %}
