{% extends "layouts/admin.html" %}
{% block title %}Institution{% endblock %}
{% block page_heading %}Add Institution{% endblock %}
{% block content %}
<div class="app-card">
    <form action="{{ url_for('save_institution') }}" method="POST" class="row g-3">
        <div class="col-12">
            <label class="form-label" for="college_name">College Name</label>
            <input class="form-control" type="text" id="college_name" name="college_name" placeholder="College Name">
        </div>
        <div class="col-12">
            <label class="form-label" for="about_college">About College</label>
            <textarea class="form-control" id="about_college" name="about_college" rows="3" placeholder="About College"></textarea>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="vision">Vision</label>
            <textarea class="form-control" id="vision" name="vision" rows="3" placeholder="Vision"></textarea>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="mission">Mission</label>
            <textarea class="form-control" id="mission" name="mission" rows="3" placeholder="Mission"></textarea>
        </div>
        <div class="col-12">
            <label class="form-label" for="principal_message">Principal Message</label>
            <textarea class="form-control" id="principal_message" name="principal_message" rows="3" placeholder="Principal Message"></textarea>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="address">Address</label>
            <input class="form-control" type="text" id="address" name="address" placeholder="Address">
        </div>
        <div class="col-md-6">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" type="email" id="email" name="email" placeholder="Email">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="phone">Phone</label>
            <input class="form-control" type="text" id="phone" name="phone" placeholder="Phone">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="website">Website</label>
            <input class="form-control" type="text" id="website" name="website" placeholder="Website">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="accreditation">Accreditation</label>
            <input class="form-control" type="text" id="accreditation" name="accreditation" placeholder="Accreditation">
        </div>
        <div class="col-12">
            <label class="form-label" for="placements">Placement Details</label>
            <textarea class="form-control" id="placements" name="placements" rows="3" placeholder="Placement Details"></textarea>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-save me-1"></i> Save Institution</button>
        </div>
    </form>
</div>
{% endblock %}
