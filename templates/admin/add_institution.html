<h1>Add Institution Details</h1>

<form action="/save_institution" method="POST">

    <input type="text" name="college_name" placeholder="College Name"><br><br>

    <textarea name="about_college" placeholder="About College"></textarea><br><br>

    <textarea name="vision" placeholder="Vision"></textarea><br><br>

    <textarea name="mission" placeholder="Mission"></textarea><br><br>

    <textarea name="principal_message" placeholder="Principal Message"></textarea><br><br>

    <input type="text" name="address" placeholder="Address"><br><br>

    <input type="email" name="email" placeholder="Email"><br><br>

    <input type="text" name="phone" placeholder="Phone"><br><br>

    <input type="text" name="website" placeholder="Website"><br><br>

    <input type="text" name="accreditation" placeholder="Accreditation"><br><br>

    <textarea name="placements" placeholder="Placement Details"></textarea><br><br>

    <button type="submit">Save Institution</button>

</form>
