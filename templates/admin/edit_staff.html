{% extends "layouts/admin.html" %}
{% block title %}Edit Staff{% endblock %}
{% block page_heading %}Edit Staff{% endblock %}
{% block content %}
<div class="app-card mb-3">
    <p class="mb-1"><strong>Staff ID:</strong> {{ staff['staff_id'] }}</p>
    <p class="mb-0 text-muted">Current name: {{ staff['name'] }}</p>
</div>
<div class="app-card">
    <form action="{{ url_for('update_staff') }}" method="POST" class="row g-3" onsubmit="return confirm('Update this staff profile?');">
        <input type="hidden" name="staff_id" value="{{ staff['staff_id'] }}">
        <div class="col-12">
            <label class="form-label" for="name">Name</label>
            <input class="form-control" type="text" id="name" name="name" value="{{ staff['name'] }}" required>
        </div>
        <div class="col-12">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password" value="{{ staff['password'] }}" required>
        </div>
        <div class="col-12 d-grid gap-2 d-md-flex">
            <button type="submit" class="btn btn-primary flex-fill">Update Staff</button>
            <a href="{{ url_for('modify_staff') }}" class="btn btn-outline-secondary flex-fill">Back to List</a>
        </div>
    </form>
</div>
{% endblock %}
